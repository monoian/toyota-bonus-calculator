<!doctype html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#111827" />
  <title>Toyota 單筆成交獎金計算器</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">Toyota Taiwan Sales Bonus</p>
      <h1>單筆成交獎金計算器</h1>
      <p class="subhead">選一台車，逐項輸入本單獎金與扣款，立刻看總獎金。</p>
    </div>
    <div class="header-actions">
      <button id="resetBtn" class="btn secondary" type="button">清空重算</button>
      <button id="copyBtn" class="btn" type="button">複製結果</button>
    </div>
  </header>

  <main class="layout">
    <section class="panel form-panel" aria-labelledby="formTitle">
      <div class="panel-title-row">
        <div>
          <p class="eyebrow">Deal Input</p>
          <h2 id="formTitle">成交資料</h2>
        </div>
        <span id="rulesVersion" class="pill">讀取規則中…</span>
      </div>

      <div id="loadError" class="alert hidden"></div>

      <form id="calculatorForm" autocomplete="off">
        <div class="grid two">
          <label>
            成交月份
            <input id="dealMonth" name="dealMonth" type="month" />
          </label>
          <label>
            業代姓名 / 代號（選填）
            <input id="salesName" name="salesName" type="text" placeholder="例如：王小明" />
          </label>
        </div>

        <div class="grid three">
          <label>
            車系
            <select id="vehicleModel" name="vehicleModel" required></select>
          </label>
          <label>
            車輛等級
            <select id="vehicleGrade" name="vehicleGrade" required></select>
          </label>
          <label>
            年式
            <select id="modelYear" name="modelYear" required></select>
          </label>
        </div>

        <div class="vehicle-card" id="vehicleCard" aria-live="polite">
          <span>請選擇車系與等級</span>
        </div>

        <div class="grid two">
          <label>
            成交金額（元，選填）
            <input id="salePrice" name="salePrice" type="number" inputmode="numeric" min="0" step="1000" placeholder="預設用建議售價" />
          </label>
          <label>
            車輛獎金（元）
            <input id="vehicleBonusAmount" name="vehicleBonusAmount" type="number" inputmode="numeric" min="0" step="100" value="0" />
          </label>
        </div>

        <hr />

        <div class="grid two">
          <label>
            階段獎金（元）
            <input id="stageBonusAmount" name="stageBonusAmount" type="number" inputmode="numeric" min="0" step="100" value="0" />
          </label>
          <label>
            業代累計獎金（元）
            <input id="cumulativeBonusAmount" name="cumulativeBonusAmount" type="number" inputmode="numeric" min="0" step="100" value="0" />
          </label>
        </div>

        <div class="grid two">
          <label>
            所支援金（元）
            <input id="supportAmount" name="supportAmount" type="number" inputmode="numeric" min="0" step="100" value="0" />
          </label>
          <label>
            0利率負擔（元）
            <input id="zeroInterestBurden" name="zeroInterestBurden" type="number" inputmode="numeric" min="0" step="100" value="0" />
          </label>
          <label>
            外促活動內扣（元）
            <input id="externalPromotionDeduction" name="externalPromotionDeduction" type="number" inputmode="numeric" min="0" step="100" value="0" />
          </label>
          <label>
            其他調整（元，可負數）
            <input id="manualAdjustment" name="manualAdjustment" type="number" inputmode="numeric" step="100" value="0" />
          </label>
          <label>
            保險乙式（元）
            <input id="insuranceBAmount" name="insuranceBAmount" type="number" inputmode="numeric" min="0" step="100" value="0" />
          </label>
          <label>
            影音（元）
            <input id="avAmount" name="avAmount" type="number" inputmode="numeric" min="0" step="100" value="0" />
          </label>
        </div>

        <label>
          備註（選填）
          <textarea id="note" name="note" rows="3" placeholder="例如：本單支援金已由所長核准"></textarea>
        </label>
      </form>
    </section>

    <aside class="panel result-panel" aria-labelledby="resultTitle">
      <p class="eyebrow">Result</p>
      <h2 id="resultTitle">獎金試算結果</h2>
      <div class="total-card">
        <span>總獎金</span>
        <strong id="totalBonus">NT$0</strong>
      </div>

      <div class="breakdown" id="breakdown"></div>

      <details class="rules-preview">
        <summary>目前套用規則</summary>
        <div id="rulesPreview"></div>
      </details>

      <p class="disclaimer">
        本工具為內部試算輔助，實際獎金請以公司公告、主管核准與最終帳務為準。
      </p>
    </aside>
  </main>

  <footer class="app-footer">
    <span id="dataStamp">車輛資料載入中…</span>
    <span>資料維護：data/vehicles.tw.toyota.2026-06-21.json、data/rules.example.json</span>
  </footer>

  <script src="assets/app.js?v=manual-entry-20260630"></script>
</body>
</html>
